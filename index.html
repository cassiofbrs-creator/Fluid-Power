<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora de Vazão Hidráulica</title>

  <link rel="stylesheet" href="style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8932972849367749"
     crossorigin="anonymous"></script>
</head>
<body>

  <div class="container">

    <header>
      <h1>Orifice Flow Calculator</h1>
      <a href="teste.html">Ir para a página Sobre</a>
      <p>Ferramenta profissional para cálculos hidráulicos</p>
    </header>

    <div class="grid">

      <div class="card">
        <h2>Dados da Tubulação</h2>

        <label>Diâmetro do tubo (mm)</label>
        <input type="number" id="diameter" value="50">

        <label>Velocidade do fluido (m/s)</label>
        <input type="number" id="velocity" value="2">

        <button onclick="calculateFlow()">
          Calcular Vazão
        </button>
      </div>

      <div class="result-card">
        <h2>Resultado</h2>

        <div id="result">
          0.00
        </div>

        <p>litros/minuto</p>
      </div>

    </div>

    <section class="formula">
      <h2>Fórmula Utilizada</h2>

      <div class="formula-box">
        Q = A × V
      </div>

      <p>
        A vazão hidráulica é calculada utilizando a área interna da tubulação e a velocidade do fluido.
      </p>
    </section>

    <section class="adsense">
      <h2>Google AdSense</h2>

      <p>
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8932972849367749"
     crossorigin="anonymous"></script>
<!-- Banner Principal -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-8932972849367749"
     data-ad-slot="2333685720"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
      </p>
    </section>

  </div>

 <script>
    function calculateFlow() {

      const diameter =
        parseFloat(document.getElementById("diameter").value);

      const velocity =
        parseFloat(document.getElementById("velocity").value);

      const diameterMeters = diameter / 1000;

      const area =
        Math.PI * Math.pow(diameterMeters / 2, 2);

      const flowM3s = area * velocity;

      const flowLMin = flowM3s * 1000 * 60;

      document.getElementById("result").innerHTML =
        flowLMin.toFixed(2);
    }

    calculateFlow();
</script>

</body>


</html>
